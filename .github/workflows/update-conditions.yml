name: Update daily river conditions

on:
  workflow_dispatch:
  schedule:
    # Roughly 6:15 AM Mountain Daylight Time. Adjust seasonally if desired.
    - cron: "15 12 * * *"

permissions:
  contents: write

jobs:
  update-conditions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily conditions
        env:
          NWS_USER_AGENT: "FishableToday/0.1 (GitHub Pages MVP)"
        run: python scripts/update_conditions.py

      - name: Commit updated conditions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily river conditions"
          file_pattern: data/daily_conditions.json
