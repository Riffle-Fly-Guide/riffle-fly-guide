name: Update daily river conditions

on:
  workflow_dispatch:
  schedule:
    # Roughly 6:15 AM Mountain Daylight Time. Adjust seasonally if desired.
    - cron: "15 12 * * *"

permissions:
  contents: write

jobs:
  update-conditions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily conditions
        env:
          NWS_USER_AGENT: "FishableToday/0.1 (GitHub Pages MVP)"
        run: python scripts/update_conditions.py

      - name: Commit updated conditions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily_conditions.json
          if git diff --cached --quiet; then
            echo "No condition changes to commit."
          else
            git commit -m "Update daily river conditions"
            git push
          fi
